document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ack) ─────────────────────────────────────────── */\n  --ap-ink-900: #0A0A0D;\n  --ap-ink-800: #131317;     /* SECONDARY */\n  --ap-ink-700: #1E1E24;\n  --ap-ink-600: #2C2C33;\n  --ap-ink-500: #4A4A52;\n  --ap-ink-400: #70707A;\n  --ap-ink-300: #9C9CA4;\n  --ap-ink-200: #C9C9CE;\n  --ap-ink-100: #E4E4E7;\n\n  /* ── Warm neutrals (cream-whites, NOT pure grey) ──────────────── */\n  --ap-neutral-0:   #FFFFFF;\n  --ap-neutral-50:  #FDFDFB;\n  --ap-neutral-100: #F8F7F3;  /* default canvas */\n  --ap-neutral-200: #F0EEE8;\n  --ap-neutral-300: #E4E1D8;\n  --ap-neutral-400: #C9C6BC;\n  --ap-neutral-500: #A09E94;\n\n  /* ── Status ───────────────────────────────────────────────────── */\n  --ap-success:    #2F7A4F;\n  --ap-success-bg: #E8F1EC;\n  --ap-warning:    #B5791A;\n  --ap-warning-bg: #F6ECD6;\n  --ap-danger:     #921C1E;   /* intentionally same as primary */\n  --ap-danger-bg:  #FAEBEB;\n  --ap-info:       #1F4B7A;\n  --ap-info-bg:    #E6EEF6;\n\n  /* ── Semantic surfaces ────────────────────────────────────────── */\n  --surface-canvas:      var(--ap-neutral-100);\n  --surface-raised:      var(--ap-neutral-0);\n  --surface-sunken:      var(--ap-neutral-200);\n  --surface-inverse:     var(--ap-ink-800);\n  --surface-brand:       var(--ap-red-600);\n  --surface-brand-soft:  var(--ap-red-50);\n\n  /* ── Foreground ───────────────────────────────────────────────── */\n  --fg-1:          var(--ap-ink-800);\n  --fg-2:          var(--ap-ink-500);\n  --fg-3:          var(--ap-ink-400);\n  --fg-4:          var(--ap-ink-300);\n  --fg-on-brand:   var(--ap-neutral-0);\n  --fg-on-brand-2: var(--ap-red-100);\n  --fg-on-inverse: var(--ap-neutral-100);\n\n  /* ── Borders / dividers ───────────────────────────────────────── */\n  --border-subtle:  var(--ap-neutral-300);\n  --border-default: var(--ap-neutral-400);\n  --border-strong:  var(--ap-ink-800);\n  --border-brand:   var(--ap-red-600);\n\n  /* ── Interactive ──────────────────────────────────────────────── */\n  --action-primary:        var(--ap-red-600);\n  --action-primary-hover:  var(--ap-red-700);\n  --action-primary-press:  var(--ap-red-900);\n  --action-primary-fg:     var(--ap-neutral-0);\n\n  --action-secondary:        var(--ap-ink-800);\n  --action-secondary-hover:  var(--ap-ink-700);\n  --action-secondary-press:  var(--ap-ink-900);\n  --action-secondary-fg:     var(--ap-neutral-0);\n\n  --action-ghost-hover: rgba(19, 19, 23, 0.06);\n  --action-ghost-press: rgba(19, 19, 23, 0.12);\n\n  --focus-ring: 0 0 0 3px rgba(146, 28, 30, 0.35);\n}\n\n/* AP Thailand — Typography tokens + semantic type classes\n   One family: AP (300/400/500/700 + italics). Weight = hierarchy axis.\n   ------------------------------------------------------------------ */\n\n:root {\n  /* ── Font stacks ──────────────────────────────────────────────── */\n  --font-sans:      \"AP\", \"Helvetica Neue\", \"Arial\", \"Noto Sans Thai\", system-ui, sans-serif;\n  --font-condensed: \"AP Condensed\", \"AP\", \"Helvetica Neue Condensed\", sans-serif;\n  --font-mono:      \"AP\", \"SF Mono\", \"Menlo\", monospace;\n\n  /* ── Size scale (rem, 1rem = 16px) ───────────────────────────── */\n  --fs-xs:   0.75rem;    /* 12 */\n  --fs-sm:   0.875rem;   /* 14 */\n  --fs-base: 1rem;       /* 16 */\n  --fs-md:   1.125rem;   /* 18 */\n  --fs-lg:   1.25rem;    /* 20 */\n  --fs-xl:   1.5rem;     /* 24 */\n  --fs-2xl:  2rem;       /* 32 */\n  --fs-3xl:  2.5rem;     /* 40 */\n  --fs-4xl:  3.25rem;    /* 52 */\n  --fs-5xl:  4.5rem;     /* 72 */\n  --fs-6xl:  6rem;       /* 96 — poster/hero */\n\n  /* ── Weights ──────────────────────────────────────────────────── */\n  --fw-light:   300; /* @kind other */\n  --fw-regular: 400; /* @kind other */\n  --fw-medium:  500; /* @kind other */\n  --fw-bold:    700; /* @kind other */\n\n  /* ── Line-heights ─────────────────────────────────────────────── */\n  --lh-tight:   1.02; /* @kind other */\n  --lh-snug:    1.15; /* @kind other */\n  --lh-normal:  1.35; /* @kind other */\n  --lh-relaxed: 1.55; /* @kind other */\n  --lh-loose:   1.75; /* @kind other */\n\n  /* ── Letter-spacing ───────────────────────────────────────────── */\n  --tracking-tight:  -0.02em; /* @kind other */\n  --tracking-normal:  0;      /* @kind other */\n  --tracking-wide:    0.04em; /* @kind other */\n  --tracking-caps:    0.08em; /* @kind other */\n}\n\n/* ── Semantic type classes ────────────────────────────────────────── */\n\n.ap-display {\n  font-family: var(--font-sans);\n  font-size: clamp(3rem, 6vw + 1rem, var(--fs-6xl));\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--fg-1);\n}\n\n.ap-h1, h1 {\n  font-family: var(--font-sans);\n  font-size: clamp(2rem, 3vw + 1rem, var(--fs-4xl));\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tracking-tight);\n  color: var(--fg-1);\n}\n\n.ap-h2, h2 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-2xl);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-normal);\n  letter-spacing: -0.01em;\n  color: var(--fg-1);\n}\n\n.ap-h3, h3 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xl);\n  font-weight: var(--fw-medium);\n  line-height: var(--lh-normal);\n  color: var(--fg-1);\n}\n\n.ap-h4, h4 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-lg);\n  font-weight: var(--fw-medium);\n  line-height: var(--lh-normal);\n  color: var(--fg-1);\n}\n\n.ap-subhead {\n  font-family: var(--font-sans);\n  font-size: var(--fs-md);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-2);\n}\n\n.ap-body, p {\n  font-family: var(--font-sans);\n  font-size: var(--fs-base);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-1);\n  text-wrap: pretty;\n}\n\n.ap-body-sm {\n  font-family: var(--font-sans);\n  font-size: var(--fs-sm);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-2);\n}\n\n.ap-caption {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-normal);\n  color: var(--fg-3);\n}\n\n.ap-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-bold);\n  line-height: 1.1;\n  letter-spacing: var(--tracking-caps);\n  text-transform: uppercase;\n  color: var(--ap-red-600);\n}\n\n.ap-label {\n  font-family: var(--font-sans);\n  font-size: var(--fs-sm);\n  font-weight: var(--fw-medium);\n  line-height: 1.3;\n  color: var(--fg-1);\n}\n\n.ap-mono {\n  font-family: var(--font-mono);\n  font-size: var(--fs-sm);\n  font-weight: var(--fw-regular);\n  color: var(--fg-2);\n}\n\n.ap-tagline {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-bold);\n  line-height: 1.05;\n  letter-spacing: -0.01em;\n  color: var(--fg-1);\n}\n\n/* AP Thailand — Spacing + shape + elevation + motion tokens\n   4px base rhythm. Pill-heavy with selective hard edges (0px).\n   ------------------------------------------------------------------ */\n\n:root {\n  /* ── Spacing scale ────────────────────────────────────────────── */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;    /* base rhythm / everyday gutter */\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-7:  32px;\n  --space-8:  40px;\n  --space-9:  48px;\n  --space-10: 64px;\n  --space-11: 80px;\n  --space-12: 96px;\n  --space-13: 128px;\n\n  /* ── Border radius ────────────────────────────────────────────── */\n  --radius-xs:   4px;\n  --radius-sm:   6px;\n  --radius-md:   10px;\n  --radius-lg:   16px;    /* default card */\n  --radius-xl:   24px;\n  --radius-pill: 999px;   /* default for buttons + chips */\n  --radius-card: 16px;\n  --radius-none: 0;       /* brand blocks, logo echo */\n\n  /* ── Elevation (warm-tinted shadows) ──────────────────────────── */\n  --shadow-xs: 0 1px 2px rgba(20, 14, 14, 0.04);\n  --shadow-sm: 0 2px 4px rgba(20, 14, 14, 0.06),\n               0 1px 2px rgba(20, 14, 14, 0.04);\n  --shadow-md: 0 6px 16px rgba(20, 14, 14, 0.08),\n               0 2px 4px rgba(20, 14, 14, 0.04);\n  --shadow-lg: 0 16px 40px rgba(20, 14, 14, 0.10),\n               0 4px 8px rgba(20, 14, 14, 0.04);\n  --shadow-xl: 0 24px 64px rgba(20, 14, 14, 0.14);\n  --shadow-focus: 0 0 0 3px rgba(146, 28, 30, 0.25);\n\n  /* ── Motion ───────────────────────────────────────────────────── */\n  --ease-standard:   cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n  --ease-emphasized: cubic-bezier(0.3, 0, 0, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 200ms; /* @kind other */\n  --dur-slow: 400ms; /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n  *{ box-sizing:border-box; }\n  body{ margin:0; }\n  .phone{ width:390px; height:820px; background:#F8F7F3; border-radius:44px; border:11px solid #131317; box-shadow:0 30px 70px rgba(20,14,14,.28), 0 8px 20px rgba(20,14,14,.14); position:relative; overflow:hidden; flex-shrink:0; }\n  .screen{ position:absolute; inset:0; display:flex; flex-direction:column; font-family:var(--font-sans); }\n  .scroll{ flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }\n  .scroll::-webkit-scrollbar{ width:0; }\n  .tapopt{ cursor:pointer; user-select:none; transition:background .16s cubic-bezier(.2,0,0,1), transform .16s cubic-bezier(.2,0,0,1), border-color .16s; }\n  .tapopt:active{ transform:scale(.98); }\n  .fld{ width:100%; font-family:var(--font-sans); font-size:15px; color:var(--fg-1); background:#fff; border:1px solid var(--border-default); border-radius:12px; padding:12px 14px; outline:none; }\n  .fld:focus{ border-color:var(--ap-red-600); box-shadow:0 0 0 3px rgba(146,28,30,.14); }\n  textarea.fld{ resize:none; }\n  /* full-screen app (PWA / opened top-level) */\n  body.pwa{ background:#131317; }\n  body.pwa .se-stage{ padding:0 !important; background:#131317 !important; min-height:100dvh !important; display:block !important; }\n  body.pwa .se-intro{ display:none !important; }\n  body.pwa .phone{ width:100vw !important; height:100vh !important; height:100dvh !important; max-width:100vw !important; border:0 !important; border-radius:0 !important; box-shadow:none !important; }\n  body.pwa .fake-status{ display:none !important; }\n  body.pwa .screen{ padding-top:env(safe-area-inset-top); }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section class=\"se-stage\" style=\"min-height:100vh; background:#EAE8E2; padding:52px 60px 90px; font-family:var(--font-sans); color:var(--fg-1); display:flex; gap:56px; align-items:flex-start; flex-wrap:wrap;\">\n\n  <header class=\"se-intro\" style=\"max-width:360px; padding-top:8px;\">\n    <div class=\"ap-eyebrow\" style=\"margin-bottom:14px;\">AP · SE FIELD TOOL<\u002Fdiv>\n    <h1 style=\"font-size:40px; line-height:1.1; letter-spacing:-.02em; margin:0 0 16px;\">ตรวจ &amp; ปรับปรุงบ้าน<\u002Fh1>\n    <p style=\"font-size:16px; line-height:1.65; color:var(--fg-2); margin:0 0 22px;\">เครื่องมือสำหรับ <b>วิศวกรโครงการ (SE)<\u002Fb> — สร้างโครงการและยูนิตเองได้ ไม่ต้องต่อฐานข้อมูล. รองรับสองงาน: <b>ตรวจรับบ้านกับลูกค้า<\u002Fb> และ <b>ปรับปรุงบ้าน Stock<\u002Fb>. ข้อมูลบันทึกในเครื่องอัตโนมัติ ออกรายงาน PDF ได้.<\u002Fp>\n    <div style=\"display:flex; flex-direction:column; gap:12px;\">\n      <div style=\"display:flex; gap:11px; align-items:flex-start;\">\n        <span style=\"width:26px; height:26px; border-radius:999px; background:var(--ap-red-600); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">1<\u002Fspan>\n        <span style=\"font-size:14px; color:var(--fg-2); line-height:1.5;\">เพิ่มโครงการ → เลือกโหมด → เพิ่มยูนิต/แปลง<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:11px; align-items:flex-start;\">\n        <span style=\"width:26px; height:26px; border-radius:999px; background:var(--ap-red-600); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">2<\u002Fspan>\n        <span style=\"font-size:14px; color:var(--fg-2); line-height:1.5;\">บันทึก defect: รูป + หมวดหมู่ + ความรุนแรง + ห้อง + สถานะ<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:11px; align-items:flex-start;\">\n        <span style=\"width:26px; height:26px; border-radius:999px; background:var(--ap-red-600); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">3<\u002Fspan>\n        <span style=\"font-size:14px; color:var(--fg-2); line-height:1.5;\">ออกรายงาน PDF ตามโหมด (ใบตรวจรับ / รายการปรับปรุง)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ resetDemo }}\" class=\"tapopt\" style=\"margin-top:26px; display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color:var(--fg-2); border:1px solid var(--border-default); border-radius:999px; padding:8px 15px; background:#fff;\">\n      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M3 12a9 9 0 1 0 3-6.7L3 8\"><\u002Fpath><path d=\"M3 3v5h5\"><\u002Fpath><\u002Fsvg>\n      รีเซ็ตข้อมูลตัวอย่าง\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"phone\">\n    <div class=\"fake-status\" style=\"position:absolute; top:0; left:0; right:0; height:52px; display:flex; align-items:flex-end; justify-content:space-between; padding:0 28px 8px; font-size:14px; font-weight:600; z-index:50; color:{{ barInk }};\">\n      <span>9:41<\u002Fspan>\n      <span style=\"display:flex; gap:7px; align-items:center;\">\n        <svg width=\"18\" height=\"12\" viewBox=\"0 0 18 12\" fill=\"currentColor\"><rect x=\"0\" y=\"7\" width=\"3\" height=\"5\" rx=\"1\"><\u002Frect><rect x=\"5\" y=\"4\" width=\"3\" height=\"8\" rx=\"1\"><\u002Frect><rect x=\"10\" y=\"1.5\" width=\"3\" height=\"10.5\" rx=\"1\"><\u002Frect><rect x=\"15\" y=\"0\" width=\"3\" height=\"12\" rx=\"1\" opacity=\".35\"><\u002Frect><\u002Fsvg>\n        <svg width=\"22\" height=\"12\" viewBox=\"0 0 24 12\" fill=\"none\"><rect x=\"1\" y=\"1\" width=\"20\" height=\"10\" rx=\"3\" stroke=\"currentColor\" stroke-opacity=\".5\"><\u002Frect><rect x=\"2.5\" y=\"2.5\" width=\"15\" height=\"7\" rx=\"1.5\" fill=\"currentColor\"><\u002Frect><rect x=\"22\" y=\"4\" width=\"1.6\" height=\"4\" rx=\".8\" fill=\"currentColor\" fill-opacity=\".5\"><\u002Frect><\u002Fsvg>\n      <\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- PROJECTS (HOME) -->\n    <sc-if value=\"{{ isProjects }}\" hint-placeholder-val=\"{{ true }}\">\n    <div class=\"screen\">\n      <div style=\"padding:62px 20px 14px;\">\n        <div style=\"font-size:14px; color:var(--fg-2);\">วิศวกรโครงการ<\u002Fdiv>\n        <div style=\"font-size:26px; font-weight:700; letter-spacing:-.01em;\">โครงการของฉัน<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"scroll\" style=\"padding:6px 20px 24px;\">\n        <sc-if value=\"{{ hasProjects }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; flex-direction:column; gap:13px;\">\n          <sc-for list=\"{{ projectCards }}\" as=\"p\" hint-placeholder-count=\"2\">\n            <div onclick=\"{{ p.open }}\" class=\"tapopt\" style=\"background:#fff; border:1px solid var(--border-subtle); border-radius:16px; padding:17px; box-shadow:var(--shadow-sm);\">\n              <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:10px;\">\n                <div>\n                  <div style=\"font-size:18px; font-weight:700; letter-spacing:-.01em;\">{{ p.name }}<\u002Fdiv>\n                  <div style=\"font-size:13px; color:var(--fg-2); margin-top:2px;\">{{ p.type }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-size:11px; font-weight:700; padding:5px 11px; border-radius:999px; background:{{ p.modeBg }}; color:{{ p.modeColor }}; white-space:nowrap;\">{{ p.modeLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:center; 2Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; margin-bottom:8px;\">หมวดหมู่<\u002Fdiv>\n        <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;\">\n          <sc-for list=\"{{ catChips }}\" as=\"c\" hint-placeholder-count=\"7\">\n            <span onclick=\"{{ c.pick }}\" class=\"tapopt\" style=\"font-size:13px; font-weight:500; padding:8px 14px; border-radius:999px; background:{{ c.bg }}; color:{{ c.color }}; border:1px solid {{ c.border }};\">{{ c.name }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; margin-bottom:8px;\">ระดับความรุนแรง<\u002Fdiv>\n        <div style=\"display:flex; gap:8px; margin-bottom:18px;\">\n          <sc-for list=\"{{ sevChips }}\" as=\"sv\" hint-placeholder-count=\"3\">\n            <span onclick=\"{{ sv.pick }}\" class=\"tapopt\" style=\"flex:1; text-align:center; font-size:13px; font-weight:600; padding:11px 4px; border-radius:12px; background:{{ sv.bg }}; color:{{ sv.color }}; border:1.5px solid {{ sv.border }};\">{{ sv.name }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; margin-bottom:8px;\">ห้อง / พื้นที่<\u002Fdiv>\n        <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;\">\n          <sc-for list=\"{{ roomChips }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <span onclick=\"{{ r.pick }}\" class=\"tapopt\" style=\"font-size:13px; font-weight:500; padding:8px 14px; border-radius:999px; background:{{ r.bg }}; color:{{ r.color }}; border:1px solid {{ r.border }};\">{{ r.name }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; margin-bottom:8px;\">รายละเอียด<\u002Fdiv>\n        <textarea class=\"fld\" rows=\"3\" value=\"{{ ddNote }}\" oninput=\"{{ setDNote }}\" placeholder=\"พิมพ์รายละเอียดที่พบ…\" style=\"margin-bottom:20px;\"><\u002Ftextarea>\n        <div onclick=\"{{ saveDefect }}\" class=\"tapopt\" style=\"background:var(--ap-red-600); color:#fff; border-radius:999px; height:54px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600;\">บันทึก defect<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:980}}\">\nconst LS_KEY = 'ap_se_inspect_v2';\nconst CATS = [\n  { id:'paint', name:'สี' }, { id:'tile', name:'กระเบื้อง' }, { id:'elec', name:'ไฟฟ้า' },\n  { id:'plumb', name:'ประปา' }, { id:'door', name:'ประตู-หน้าต่าง' }, { id:'wood', name:'งานไม้' }, { id:'ceil', name:'ฝ้า/ผนัง' },\n];\nconst SEV = {\n  high:{ name:'ร้ายแรง', color:'#921C1E', bg:'#FAEBEB', border:'#E8A8A9' },\n  mid: { name:'ปานกลาง', color:'#B5791A', bg:'#F6ECD6', border:'#E4C98A' },\n  low: { name:'เล็กน้อย', color:'#4A4A52', bg:'#F0EEE8', border:'#C9C6BC' },\n};\nconst STATUS = {\n  open:{ name:'รอแก้', color:'#921C1E', bg:'#FAEBEB' },\n  prog:{ name:'กำลังแก้', color:'#B5791A', bg:'#F6ECD6' },\n  done:{ name:'แก้แล้ว', color:'#2F7A4F', bg:'#E8F1EC' },\n};\nconst ROOMS = ['ห้องนั่งเล่น','ครัว','ห้องนอนใหญ่','ห้องนอน 2','ห้องน้ำ','ระเบียง','โรงจอดรถ','ภายนอก'];\nconst TYPES = ['บ้านเดี่ยว','บ้านแฝด','ทาวน์โฮม','คอนโดฯ'];\n\nfunction uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }\n\nfunction seed() {\n  return [\n    { id:uid(), name:'The Sonne พระราม 9', type:'บ้านเดี่ยว', mode:'handover', units:[\n      { id:uid(), code:'แปลง A-101', customer:'คุณสมชาย ใจดี', appt:'วันนี้ 10:30', defects:[\n        { id:uid(), room:'ห้องนั่งเล่น', cat:'paint', sev:'mid', status:'open', note:'สีผนังเป็นรอยด่าง มุมล่างซ้าย', photos:[], time:'09:24' },\n        { id:uid(), room:'ครัว', cat:'tile', sev:'high', status:'open', note:'กระเบื้องปูพื้นแตกร้าว 1 แผ่น', photos:[], time:'09:41' },\n        { id:uid(), room:'ห้องน้ำ', cat:'plumb', sev:'high', status:'prog', note:'ก๊อกอ่างล้างหน้ารั่วซึม', photos:[], time:'10:02' },\n      ]},\n      { id:uid(), code:'แปลง A-102', customer:'คุณมาลี รักบ้าน', appt:'วันนี้ 13:30', defects:[\n        { id:uid(), room:'ระเบียง', cat:'door', sev:'low', status:'done', note:'บานเลื่อนฝืด ปรับรางแล้ว', photos:[], time:'เมื่อวาน' },\n      ]},\n    ]},\n    { id:uid(), name:'Pleno วงแหวน-ลำลูกกา', type:'ทาวน์โฮม', mode:'stock', units:[\n      { id:uid(), code:'บ้านเลขที่ 45/12', customer:'ว่างเกิน 1 ปี', appt:'', defects:[\n        { id:uid(), room:'ฝ้า/ผนัง', cat:'ceil', sev:'mid', status:'open', note:'ฝ้าเพดานมีคราบน้ำ ต้องทาสีใหม่', photos:[], time:'11:30' },\n        { id:uid(), room:'ภายนอก', cat:'paint', sev:'mid', status:'open', note:'สีภายนอกซีดจาง ผนังทิศตะวันตก', photos:[], time:'11:45' },\n      ]},\n    ]},\n  ];\n}\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const loaded = this.load();\n    this.state = {\n      screen:'projects', curP:null, curU:null, overlay:null,\n      dp:{ name:'', type:'บ้านเดี่ยว', mode:'handover' },\n      du:{ code:'', customer:'', appt:'' },\n      dd:{ room:'ห้องนั่งเล่น', cat:'paint', sev:'mid', status:'open', note:'', photos:[] },\n      projects: (loaded && loaded.length) ? loaded : seed(),\n    };\n  }\n\n  load(){ try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch(e){ return null; } }\n  commit(projects){ try { localStorage.setItem(LS_KEY, JSON.stringify(projects)); } catch(e){} this.setState({ projects }); }\n  resetDemo(){ const s = seed(); try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e){} this.setState({ projects:s, screen:'projects', curP:null, curU:null, overlay:null }); }\n\n  getP(){ return this.state.projects.find(p=>p.id===this.state.curP); }\n  getU(){ const p=this.getP(); return p ? p.units.find(u=>u.id===this.state.curU) : null; }\n\n  updateProject(pid, fn){\n    const projects = this.state.projects.map(p => p.id===pid ? fn({...p}) : p);\n    this.commit(projects);\n  }\n\n  photoFromFile(file){\n    return new Promise((res)=>{\n      const r = new FileReader();\n      r.onload = () => {\n        const img = new Image();\n        img.onload = () => {\n          const max = 640; let w = img.width, h = img.height;\n          const sc = Math.min(1, max/Math.max(w,h));\n          const c = document.createElement('canvas'); c.width = Math.round(w*sc); c.height = Math.round(h*sc);\n          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);\n          res(c.toDataURL('image/jpeg', 0.5));\n        };\n        img.onerror = () => res(null);\n        img.src = r.result;\n      };\n      r.onerror = () => res(null);\n      r.readAsDataURL(file);\n    });\n  }\n\n  progressOf(p){ let t=0,d=0; p.units.forEach(u=>u.defects.forEach(x=>{ t++; if(x.status==='done') d++; })); return t===0?0:Math.round(d/t*100); }\n  openDefects(p){ let n=0; p.units.forEach(u=>u.defects.forEach(d=>{ if(d.status!=='done') n++; })); return n; }\n  defCount(p){ let n=0; p.units.forEach(u=>n+=u.defects.length); return n; }\n  unitStName(u){\n    if(u.defects.length===0) return { stLabel:'ยังไม่ตรวจ', stColor:'#4A4A52', stBg:'#F0EEE8' };\n    const open = u.defects.some(d=>d.status!=='done');\n    return open ? { stLabel:'มี defect', stColor:'#921C1E', stBg:'#FAEBEB' } : { stLabel:'ผ่าน', stColor:'#2F7A4F', stBg:'#E8F1EC' };\n  }\n  modeMeta(mode){\n    return mode==='stock'\n      ? { label:'ปรับปรุง Stock', bg:'#EDE7F0', color:'#5B3A82', unitWord:'บ้าน' }\n      : { label:'ตรวจรับลูกค้า', bg:'#E3EEF5', color:'#215E7A', unitWord:'ยูนิต' };\n  }\n  cat(id){ return (CATS.find(c=>c.id===id)||{name:id}).name; }\n\n  componentDidMount(){\n    let embedded = true; try { embedded = window.self !== window.top; } catch(e){ embedded = true; }\n    let standalone = false; try { standalone = matchMedia('(display-mode: standalone)').matches || navigator.standalone === true; } catch(e){}\n    const forceApp = /[?&]app(?:=|&|$)/.test(location.search) || location.hash === '#app';\n    if (!embedded || standalone || forceApp) {\n      document.body.classList.add('pwa');\n      if (!embedded) this.registerPWA();\n    }\n  }\n\n  registerPWA(){\n    try {\n      const vp = document.querySelector('meta[name=\"viewport\"]');\n      if (vp) vp.setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover');\n      const add = (tag, attrs) => { const el = document.createElement(tag); Object.keys(attrs).forEach(k => el.setAttribute(k, attrs[k])); document.head.appendChild(el); };\n      add('meta', { name:'theme-color', content:'#921C1E' });\n      add('meta', { name:'apple-mobile-web-app-capable', content:'yes' });\n      add('meta', { name:'mobile-web-app-capable', content:'yes' });\n      add('meta', { name:'apple-mobile-web-app-status-bar-style', content:'black-translucent' });\n      add('meta', { name:'apple-mobile-web-app-title', content:'ตรวจบ้าน AP' });\n      add('link', { rel:'apple-touch-icon', href:'icon-192.png' });\n      add('link', { rel:'manifest', href:'manifest.webmanifest' });\n      if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function(){}); }\n    } catch(e){}\n  }\n\n  renderVals(){\n    const s = this.state;\n    const P = this.getP();\n    const U = this.getU();\n    const mm = P ? this.modeMeta(P.mode) : this.modeMeta('handover');\n\n    const projectCards = s.projects.map(p => {\n      const meta = this.modeMeta(p.mode);\n      return { name:p.name, type:p.type, modeLabel:meta.label, modeBg:meta.bg, modeColor:meta.color,\n        unitWord:meta.unitWord, unitCount:p.units.length, defectCount:this.defCount(p), progress:this.progressOf(p),\n        openLabel: this.openDefects(p)>0 ? (this.openDefects(p)+' รอแก้') : (this.defCount(p)>0?'ครบแล้ว':'ยังไม่เริ่ม'),\n        open: () => this.setState({ screen:'project', curP:p.id }) };\n    });\n\n    let curPUnits = [];\n    if (P) {\n      curPUnits = P.units.map(u => {\n        const st = this.unitStName(u);\n        const open = u.defects.filter(d=>d.status!=='done').length;\n        const sub = P.mode==='stock' ? (u.customer || 'บ้าน Stock')\n          : (u.customer ? (u.customer + (u.appt? ' · '+u.appt : '')) : (u.appt||'ลูกค้า'));\n        return { code:u.code, sub, ...st, defTotal:u.defects.length,\n          openLabel: open>0 ? (open+' รอแก้') : (u.defects.length>0?'ผ่านแล้ว':'ยังไม่ตรวจ'),\n          open: () => this.setState({ screen:'unit', curU:u.id }) };\n      });\n    }\n\n    let curUDefects = [];\n    if (P && U) {\n      curUDefects = U.defects.map(d => {\n        const sev = SEV[d.sev], st = STATUS[d.status];\n        const hasPhoto = d.photos && d.photos.length>0;\n        return { catName:this.cat(d.cat), note:d.note, room:d.room,\n          sevName:sev.name, sevColor:sev.color, stName:st.name, stColor:st.color, stBg:st.bg,\n          noPhoto: !hasPhoto, thumbBg: hasPhoto ? ('url('+d.photos[0]+')') : 'none',\n          cycleStatus: () => this.updateProject(P.id, pp => {\n            pp.units = pp.units.map(u => u.id!==U.id ? u : { ...u, defects: u.defects.map(x => {\n              if(x.id!==d.id) return x;\n              const order=['open','prog','done']; const ni=(order.indexOf(x.status)+1)%3;\n              return { ...x, status:order[ni] };\n            })});\n            return pp;\n          }),\n          remove: () => this.updateProject(P.id, pp => {\n            pp.units = pp.units.map(u => u.id!==U.id ? u : { ...u, defects: u.defects.filter(x=>x.id!==d.id) });\n            return pp;\n          }),\n        };\n      });\n    }\n\n    const typeChips = TYPES.map(t => { const on=s.dp.type===t; return { name:t, pick:()=>this.setState({dp:{...s.dp,type:t}}),\n      bg:on?'#131317':'#fff', color:on?'#fff':'var(--fg-1)', border:on?'#131317':'var(--border-default)' }; });\n    const modeDefs = [\n      { id:'handover', title:'ตรวจรับบ้านกับลูกค้า', desc:'เดินตรวจพร้อมลูกค้า บันทึกจุดที่ต้องแก้ก่อนโอน', accent:'#215E7A' },\n      { id:'stock', title:'ปรับปรุงบ้าน Stock', desc:'สำรวจบ้านคงคลังเพื่อทำรายการซ่อม/ปรับปรุงก่อนขาย', accent:'#5B3A82' },\n    ];\n    const modeChoices = modeDefs.map(m => { const on=s.dp.mode===m.id; return {\n      title:m.title, desc:m.desc, pick:()=>this.setState({dp:{...s.dp,mode:m.id}}),\n      border:on?m.accent:'var(--border-default)', dot:on?m.accent:'var(--ap-neutral-400)',\n      dotFill:on?m.accent:'transparent', titleColor:on?m.accent:'var(--fg-1)' }; });\n\n    const addIsStock = !!(P && P.mode==='stock');\n\n    const catChips = CATS.map(c => { const on=s.dd.cat===c.id; return { name:c.name, pick:()=>this.setState({dd:{...s.dd,cat:c.id}}),\n      bg:on?'var(--ap-red-600)':'#fff', color:on?'#fff':'var(--fg-1)', border:on?'var(--ap-red-600)':'var(--border-default)' }; });\n    const sevChips = ['high','mid','low'].map(id => { const v=SEV[id]; const on=s.dd.sev===id; return { name:v.name, pick:()=>this.setState({dd:{...s.dd,sev:id}}),\n      bg:on?v.bg:'#fff', color:on?v.color:'var(--fg-2)', border:on?v.color:'var(--border-default)' }; });\n    const roomChips = ROOMS.map(r => { const on=s.dd.room===r; return { name:r, pick:()=>this.setState({dd:{...s.dd,room:r}}),\n      bg:on?'#131317':'#fff', color:on?'#fff':'var(--fg-1)', border:on?'#131317':'var(--border-default)' }; });\n    const ddPhotos = (s.dd.photos||[]).map((url,i) => ({ url:'url('+url+')',\n      remove:()=>this.setState(st=>({ dd:{...st.dd, photos:st.dd.photos.filter((_,j)=>j!==i)} })) }));\n\n    return {\n      barInk: (s.screen==='unit' || s.screen==='project') && !s.overlay ? '#fff' : '#131317',\n      isProjects: s.screen==='projects', isProject: s.screen==='project', isUnit: s.screen==='unit',\n      goProjects: ()=>this.setState({ screen:'projects', curP:null, curU:null }),\n      goProject: ()=>this.setState({ screen:'project', curU:null }),\n      hasProjects: s.projects.length>0, noProjects: s.projects.length===0, projectCards,\n      resetDemo: ()=>this.resetDemo(),\n      curPName: P?P.name:'', curPType: P?P.type:'', curPModeLabel: mm.label, curPUnitWord: mm.unitWord,\n      curPUnitCount: P?P.units.length:0, curPOpen: P?this.openDefects(P):0, curPProgress: P?this.progressOf(P):0,\n      curPUnits, curPHasUnits: !!(P&&P.units.length>0), curPNoUnits: !!(P&&P.units.length===0),\n      curUCode: U?U.code:'', curUSub: U ? (P.mode==='stock'? (U.customer||'บ้าน Stock') : (U.customer? (U.customer+(U.appt?' · '+U.appt:'')) : (U.appt||''))) : '',\n      curUDefects, curUDefCount: U?U.defects.length:0, curUHasDef: !!(U&&U.defects.length>0), curUNoDef: !!(U&&U.defects.length===0),\n      ovAddP: s.overlay==='addP', ovAddU: s.overlay==='addU', ovRec: s.overlay==='rec',\n      closeOverlay: ()=>this.setState({ overlay:null }),\n      openAddP: ()=>this.setState({ overlay:'addP', dp:{ name:'', type:'บ้านเดี่ยว', mode:'handover' } }),\n      openAddU: ()=>this.setState({ overlay:'addU', du:{ code:'', customer:'', appt:'' } }),\n      openRec: ()=>this.setState({ overlay:'rec', dd:{ room:'ห้องนั่งเล่น', cat:'paint', sev:'mid', status:'open', note:'', photos:[] } }),\n      dpName: s.dp.name, setPName: e=>this.setState({ dp:{...s.dp, name:e.target.value} }),\n      typeChips, modeChoices,\n      savePBg: s.dp.name.trim() ? 'var(--ap-red-600)' : 'var(--ap-neutral-400)',\n      saveProject: ()=>{\n        if(!s.dp.name.trim()) return;\n        const np = { id:uid(), name:s.dp.name.trim(), type:s.dp.type, mode:s.dp.mode, units:[] };\n        const projects = [np, ...s.projects];\n        try { localStorage.setItem(LS_KEY, JSON.stringify(projects)); } catch(e){}\n        this.setState({ projects, overlay:null, screen:'project', curP:np.id });\n      },\n      isHandover: P ? P.mode!=='stock' : true, isStock: addIsStock,\n      uCodeLabel: addIsStock ? 'บ้านเลขที่ / รหัสบ้าน' : 'รหัสยูนิต / แปลง',\n      uCodePlaceholder: addIsStock ? 'เช่น บ้านเลขที่ 45/12' : 'เช่น แปลง A-101',\n      duCode: s.du.code, setUCode: e=>this.setState({ du:{...s.du, code:e.target.value} }),\n      duCustomer: s.du.customer, setUCustomer: e=>this.setState({ du:{...s.du, customer:e.target.value} }),\n      duAppt: s.du.appt, setUAppt: e=>this.setState({ du:{...s.du, appt:e.target.value} }),\n      saveUBg: s.du.code.trim() ? 'var(--ap-red-600)' : 'var(--ap-neutral-400)',\n      saveUnit: ()=>{\n        if(!P || !s.du.code.trim()) return;\n        const nu = { id:uid(), code:s.du.code.trim(), customer:s.du.customer.trim(), appt:s.du.appt.trim(), defects:[] };\n        this.updateProject(P.id, pp => { pp.units = [...pp.units, nu]; return pp; });\n        this.setState({ overlay:null });\n      },\n      catChips, sevChips, roomChips, ddPhotos,\n      ddNote: s.dd.note, setDNote: e=>this.setState({ dd:{...s.dd, note:e.target.value} }),\n      addPhoto: async (e)=>{\n        const f = e.target.files && e.target.files[0]; if(!f) return;\n        const url = await this.photoFromFile(f);\n        if(url) this.setState(st=>({ dd:{...st.dd, photos:[...st.dd.photos, url]} }));\n        e.target.value='';\n      },\n      saveDefect: ()=>{\n        if(!P || !U) return;\n        const now = new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});\n        const nd = { id:uid(), room:s.dd.room, cat:s.dd.cat, sev:s.dd.sev, status:s.dd.status,\n          note:s.dd.note.trim()||'(ไม่มีรายละเอียด)', photos:s.dd.photos, time:now };\n        this.updateProject(P.id, pp => {\n          pp.units = pp.units.map(u => u.id!==U.id ? u : { ...u, defects:[...u.defects, nd] });\n          return pp;\n        });\n        this.setState({ overlay:null });\n      },\n      exportProjectPDF: ()=>this.exportPDF(P),\n    };\n  }\n\n  exportPDF(P){\n    if(!P) return;\n    const esc = t => String(t==null?'':t).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));\n    const mm = this.modeMeta(P.mode);\n    const isStock = P.mode==='stock';\n    const today = new Date().toLocaleDateString('th-TH',{ day:'numeric', month:'long', year:'numeric' });\n    const title = isStock ? 'รายการปรับปรุงบ้าน Stock' : 'ใบรายการตรวจรับบ้าน';\n    let all=[]; P.units.forEach(u=>u.defects.forEach(d=>all.push(d)));\n    const counts = { all: all.length, open: all.filter(d=>d.status==='open').length,\n      prog: all.filter(d=>d.status==='prog').length, done: all.filter(d=>d.status==='done').length };\n    const STCOL = { open:'#921C1E', prog:'#B5791A', done:'#2F7A4F' };\n    const STTH = { open:'รอแก้', prog:'กำลังแก้', done:'แก้แล้ว' };\n\n    const unitBlocks = P.units.map(u => {\n      const rows = u.defects.map((d,i)=>{\n        const sev = SEV[d.sev];\n        const thumb = (d.photos&&d.photos[0]) ? '<img src=\"'+d.photos[0]+'\" style=\"width:52px;height:40px;object-fit:cover;border-radius:4px;\">' : '<span style=\"color:#C9C6BC;font-size:10px;\">—<\u002Fspan>';\n        return '<tr><td class=\"c\">'+(i+1)+'<\u002Ftd><td class=\"c\">'+thumb+'<\u002Ftd><td>'+esc(d.room)+'<\u002Ftd><td>'+esc(this.cat(d.cat))+'<\u002Ftd><td>'+esc(d.note)+'<\u002Ftd><td class=\"c\"><b style=\"color:'+sev.color+'\">'+esc(sev.name)+'<\u002Fb><\u002Ftd><td class=\"c\"><span class=\"st\" style=\"color:'+STCOL[d.status]+';border-color:'+STCOL[d.status]+'\">'+esc(STTH[d.status])+'<\u002Fspan><\u002Ftd><\u002Ftr>';\n      }).join('') || '<tr><td colspan=\"7\" style=\"text-align:center;color:#9C9CA4;padding:14px;\">ไม่มี defect<\u002Ftd><\u002Ftr>';\n      const sub = isStock ? (u.customer? 'หมายเหตุ: '+esc(u.customer) : '') : (u.customer? 'ลูกค้า: '+esc(u.customer)+(u.appt? ' · '+esc(u.appt):'') : (u.appt?esc(u.appt):''));\n      return '<section class=\"unit\"><h2>'+esc(u.code)+' <span>'+sub+'<\u002Fspan><\u002Fh2><table><thead><tr><th class=\"c\">#<\u002Fth><th class=\"c\">รูป<\u002Fth><th>ห้อง<\u002Fth><th>หมวดหมู่<\u002Fth><th>รายละเอียด<\u002Fth><th class=\"c\">ระดับ<\u002Fth><th class=\"c\">สถานะ<\u002Fth><\u002Ftr><\u002Fthead><tbody>'+rows+'<\u002Ftbody><\u002Ftable><\u002Fsection>';\n    }).join('');\n\n    const sign = isStock ? '' : '<div class=\"sign\"><div><div class=\"sline\"><\u002Fdiv>ผู้ตรวจ (SE)<\u002Fdiv><div><div class=\"sline\"><\u002Fdiv>ลูกค้า / ผู้รับมอบ<\u002Fdiv><\u002Fdiv>';\n\n    const css = '@page{size:A4;margin:15mm 13mm;}*{box-sizing:border-box;}body{font-family:\"Sarabun\",\"Noto Sans Thai\",-apple-system,sans-serif;color:#131317;margin:0;}.top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #921C1E;padding-bottom:13px;margin-bottom:20px;}.brand{font-size:26px;font-weight:800;color:#921C1E;letter-spacing:-.5px;}.brand small{display:block;font-size:10px;font-weight:700;letter-spacing:2px;color:#131317;margin-top:2px;}.meta{text-align:right;font-size:12px;color:#4A4A52;line-height:1.6;}h1{font-size:19px;margin:0 0 3px;}.pj{font-size:13px;color:#4A4A52;margin-bottom:20px;}.summary{display:flex;gap:9px;margin-bottom:22px;}.card{flex:1;border:1px solid #E2DFD6;border-radius:9px;padding:9px 13px;}.card b{display:block;font-size:22px;}.card span{font-size:11px;color:#4A4A52;}.unit{margin-bottom:20px;page-break-inside:avoid;}.unit h2{font-size:14px;background:#F0EEE8;padding:7px 12px;border-radius:6px;margin:0 0 7px;display:flex;justify-content:space-between;align-items:baseline;}.unit h2 span{font-weight:500;color:#4A4A52;font-size:11.5px;}table{width:100%;border-collapse:collapse;font-size:11.5px;}th{text-align:left;background:#921C1E;color:#fff;padding:6px 8px;font-weight:600;}td{padding:6px 8px;border-bottom:1px solid #EAE8E2;vertical-align:top;}td.c,th.c{text-align:center;}.st{font-weight:700;border:1px solid;border-radius:999px;padding:2px 8px;font-size:10.5px;white-space:nowrap;}.sign{display:flex;gap:60px;margin-top:44px;page-break-inside:avoid;}.sign>div{flex:1;font-size:12px;color:#4A4A52;text-align:center;}.sline{border-bottom:1px solid #131317;height:40px;margin-bottom:6px;}.foot{margin-top:26px;border-top:1px solid #EAE8E2;padding-top:9px;font-size:10px;color:#9C9CA4;display:flex;justify-content:space-between;}@media screen{body{background:#EAE8E2;}.page{background:#fff;max-width:800px;margin:24px auto;padding:38px 42px;box-shadow:0 8px 30px rgba(0,0,0,.15);}.ph{position:fixed;top:16px;right:16px;background:#921C1E;color:#fff;padding:12px 18px;border-radius:999px;font:600 13px sans-serif;cursor:pointer;border:0;}}@media print{.page{padding:0;}.ph{display:none;}}';\n\n    const body = '<div class=\"page\"><div class=\"top\"><div class=\"brand\">AP<small>SE FIELD REPORT<\u002Fsmall><\u002Fdiv><div class=\"meta\">'+esc(title)+'<br>วันที่: '+today+'<br>ผู้ตรวจ (SE): ______________<\u002Fdiv><\u002Fdiv><h1>'+esc(title)+'<\u002Fh1><div class=\"pj\">โครงการ: '+esc(P.name)+' · '+esc(P.type)+' · '+esc(mm.label)+'<\u002Fdiv><div class=\"summary\"><div class=\"card\"><b>'+counts.all+'<\u002Fb><span>ทั้งหมด<\u002Fspan><\u002Fdiv><div class=\"card\"><b style=\"color:#921C1E\">'+counts.open+'<\u002Fb><span>รอแก้<\u002Fspan><\u002Fdiv><div class=\"card\"><b style=\"color:#B5791A\">'+counts.prog+'<\u002Fb><span>กำลังแก้<\u002Fspan><\u002Fdiv><div class=\"card\"><b style=\"color:#2F7A4F\">'+counts.done+'<\u002Fb><span>แก้แล้ว<\u002Fspan><\u002Fdiv><\u002Fdiv>'+unitBlocks+sign+'<div class=\"foot\"><span>AP (Thailand) PCL · ชีวิตดีๆ ที่เลือกเองได้<\u002Fspan><span>สร้างอัตโนมัติจากแอปตรวจ &amp; ปรับปรุงบ้าน<\u002Fspan><\u002Fdiv><\u002Fdiv>';\n    const scriptTag = '<scr'+'ipt>window.addEventListener(\"load\",function(){setTimeout(function(){window.print();},450);});<\u002Fscr'+'ipt>';\n    const html = '<!DOCTYPE html><html lang=\"th\"><head><meta charset=\"utf-8\"><title>'+esc(title)+' · '+esc(P.name)+'<\u002Ftitle><style>'+css+'<\u002Fstyle><\u002Fhead><body>'+body+'<button class=\"ph\" onclick=\"window.print()\">พิมพ์ / บันทึก PDF<\u002Fbutton>'+scriptTag+'<\u002Fbody><\u002Fhtml>';\n    const w = window.open('', '_blank');\n    if(w){ w.document.open(); w.document.write(html); w.document.close(); }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
