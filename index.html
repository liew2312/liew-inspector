<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#921C1E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ตรวจบ้าน AP">
<meta name="description" content="เครื่องมือวิศวกรโครงการ (SE) บันทึก defect และออกรายงานตรวจรับ/ปรับปรุงบ้าน — ใช้งานออฟไลน์ ข้อมูลเก็บในเครื่อง">

<title>ตรวจ &amp; ปรับปรุงบ้าน AP</title>
<style>
/* ── AP Thailand design tokens (trimmed to what this app uses) ───────── */
@font-face{ font-family:"AP"; src:url("fonts/AP-Light300.ttf") format("truetype"); font-weight:300; font-style:normal; font-display:swap; }
@font-face{ font-family:"AP"; src:url("fonts/AP-Regular400.ttf") format("truetype"); font-weight:400; font-style:normal; font-display:swap; }
@font-face{ font-family:"AP"; src:url("fonts/AP-Italic400.ttf") format("truetype"); font-weight:400; font-style:italic; font-display:swap; }
@font-face{ font-family:"AP"; src:url("fonts/AP-Medium500.ttf") format("truetype"); font-weight:500; font-style:normal; font-display:swap; }
@font-face{ font-family:"AP"; src:url("fonts/AP-MediumItalic500.ttf") format("truetype"); font-weight:500; font-style:italic; font-display:swap; }
@font-face{ font-family:"AP"; src:url("fonts/AP-Bold700.ttf") format("truetype"); font-weight:700; font-style:normal; font-display:swap; }
@font-face{ font-family:"AP"; src:url("fonts/AP-BoldItalic700.ttf") format("truetype"); font-weight:700; font-style:italic; font-display:swap; }
@font-face{ font-family:"AP Condensed"; src:url("fonts/AP-Condensed300.ttf") format("truetype"); font-weight:300; font-style:normal; font-display:swap; }

:root{
  --ap-red-900:#5A0B0C; --ap-red-800:#6E1214; --ap-red-700:#811618; --ap-red-600:#921C1E;
  --ap-red-500:#A62224; --ap-red-400:#B73B3D; --ap-red-300:#D26D6F; --ap-red-200:#E8A8A9;
  --ap-red-100:#F3D4D4; --ap-red-50:#FAEBEB;
  --ap-ink-900:#0A0A0D; --ap-ink-800:#131317; --ap-ink-700:#1E1E24; --ap-ink-500:#4A4A52;
  --ap-ink-400:#70707A; --ap-ink-300:#9C9CA4; --ap-ink-200:#C9C9CE;
  --ap-neutral-0:#FFFFFF; --ap-neutral-50:#FDFDFB; --ap-neutral-100:#F8F7F3; --ap-neutral-200:#F0EEE8;
  --ap-neutral-300:#E4E1D8; --ap-neutral-400:#C9C6BC; --ap-neutral-500:#A09E94;
  --success:#2F7A4F; --success-bg:#E8F1EC; --warning:#B5791A; --warning-bg:#F6ECD6;
  --danger:#921C1E; --danger-bg:#FAEBEB; --info:#1F4B7A; --info-bg:#E6EEF6;
  --border-subtle:var(--ap-neutral-300); --border-default:var(--ap-neutral-400);
  --fg-1:var(--ap-ink-800); --fg-2:var(--ap-ink-500); --fg-3:var(--ap-ink-400);
  --font-sans:"AP","Helvetica Neue","Arial","Noto Sans Thai",system-ui,sans-serif;
  --shadow-sm:0 2px 4px rgba(20,14,14,.06),0 1px 2px rgba(20,14,14,.04);
  --shadow-md:0 6px 16px rgba(20,14,14,.08),0 2px 4px rgba(20,14,14,.04);
  --shadow-lg:0 16px 40px rgba(20,14,14,.10),0 4px 8px rgba(20,14,14,.04);
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; height:100%; }
body{
  background:var(--ap-ink-800);
  font-family:var(--font-sans); color:var(--fg-1);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
button, input, textarea{ font-family:inherit; }
img{ max-width:100%; }

#app{ height:100dvh; }
.app-shell{
  position:relative; height:100dvh; max-width:560px; margin:0 auto;
  background:var(--ap-neutral-100); overflow:hidden;
  box-shadow: 0 0 0 1px rgba(0,0,0,.04);
}
@media (min-width:561px){
  body{ padding:0; }
  .app-shell{ box-shadow:var(--shadow-lg); }
}

.screen{ height:100%; display:flex; flex-direction:column; }
.scroll{ flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.scroll::-webkit-scrollbar{ width:0; }

.tapopt{ cursor:pointer; user-select:none; -webkit-user-select:none; transition:transform .12s ease, background .12s ease, border-color .12s ease; }
.tapopt:active{ transform:scale(.97); }

.icon-btn{ width:34px; height:34px; border-radius:999px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

.fld{ width:100%; font-family:var(--font-sans); font-size:15px; color:var(--fg-1); background:#fff;
  border:1px solid var(--border-default); border-radius:12px; padding:12px 14px; outline:none; }
.fld:focus{ border-color:var(--ap-red-600); box-shadow:0 0 0 3px rgba(146,28,30,.14); }
textarea.fld{ resize:none; font-size:15px; line-height:1.45; }
.field-label{ font-size:13px; font-weight:600; margin-bottom:7px; }

.chip{ font-size:13px; font-weight:500; padding:8px 14px; border-radius:999px; background:#fff; color:var(--fg-1);
  border:1px solid var(--border-default); display:inline-flex; align-items:center; gap:6px; }
.chip.is-active{ background:var(--ap-ink-800); color:#fff; border-color:var(--ap-ink-800); }
.chip-row{ display:flex; gap:8px; flex-wrap:wrap; }

.sev-chip{ flex:1; text-align:center; font-size:13px; font-weight:600; padding:11px 4px; border-radius:12px; background:#fff; border:1.5px solid var(--border-default); color:var(--fg-2); }
.sev-chip.is-active[data-value="high"]{ background:var(--danger-bg); color:var(--danger); border-color:var(--danger); }
.sev-chip.is-active[data-value="mid"]{ background:var(--warning-bg); color:var(--warning); border-color:var(--warning); }
.sev-chip.is-active[data-value="low"]{ background:var(--ap-neutral-200); color:var(--fg-2); border-color:var(--ap-neutral-400); }

.mode-card{ border:1.5px solid var(--border-default); background:#fff; border-radius:14px; padding:14px 15px; display:flex; gap:12px; align-items:flex-start; }
.mode-card .dot{ width:22px; height:22px; border-radius:999px; border:2px solid var(--ap-neutral-400); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; }
.mode-card .dot span{ width:11px; height:11px; border-radius:999px; background:transparent; }
.mode-card.is-active[data-value="handover"]{ border-color:#215E7A; }
.mode-card.is-active[data-value="handover"] .dot{ border-color:#215E7A; }
.mode-card.is-active[data-value="handover"] .dot span{ background:#215E7A; }
.mode-card.is-active[data-value="handover"] .mode-title{ color:#215E7A; }
.mode-card.is-active[data-value="stock"]{ border-color:#5B3A82; }
.mode-card.is-active[data-value="stock"] .dot{ border-color:#5B3A82; }
.mode-card.is-active[data-value="stock"] .dot span{ background:#5B3A82; }
.mode-card.is-active[data-value="stock"] .mode-title{ color:#5B3A82; }
.mode-title{ font-size:15px; font-weight:700; color:var(--fg-1); }
.mode-desc{ font-size:12.5px; color:var(--fg-2); margin-top:2px; line-height:1.4; }

.btn-primary{ background:var(--ap-red-600); color:#fff; border-radius:999px; height:54px; display:flex; align-items:center; justify-content:center; gap:9px; font-size:16px; font-weight:600; box-shadow:var(--shadow-md); border:none; width:100%; }
.btn-primary[disabled], .btn-primary.is-disabled{ background:var(--ap-neutral-400); box-shadow:none; }
.btn-outline-round{ flex-shrink:0; width:54px; height:54px; border-radius:999px; background:#fff; border:1.5px solid var(--fg-1); display:flex; align-items:center; justify-content:center; color:var(--fg-1); }

.bottom-bar{ flex:0 0 auto; padding:12px 20px calc(16px + var(--safe-b)); background:linear-gradient(to top,#F8F7F3 68%, rgba(248,247,243,0)); display:flex; gap:10px; }

.card{ background:#fff; border:1px solid var(--border-subtle); border-radius:16px; box-shadow:var(--shadow-sm); }

.progress-track{ flex:1; height:7px; border-radius:999px; background:var(--ap-neutral-200); overflow:hidden; }
.progress-fill{ height:100%; background:var(--ap-red-600); border-radius:999px; }

.thumb{ background-color:var(--ap-neutral-200); background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; color:var(--ap-neutral-500); }

.overlay-backdrop{ position:absolute; inset:0; background:rgba(19,19,23,.42); z-index:60; }
.overlay-sheet{ position:absolute; left:0; right:0; bottom:0; background:#F8F7F3; border-radius:26px 26px 0 0;
  padding:14px 20px calc(24px + var(--safe-b)); max-height:92%; overflow-y:auto; box-shadow:0 -12px 40px rgba(20,14,14,.2); z-index:61; }
.sheet-grabber{ width:40px; height:5px; border-radius:999px; background:var(--ap-neutral-400); margin:0 auto 16px; }

.photo-tile{ width:76px; height:76px; border-radius:14px; background-size:cover; background-position:center; position:relative; border:1px solid var(--border-subtle); background-color:var(--ap-neutral-200); flex-shrink:0; }
.photo-add-tile{ width:76px; height:76px; border:2px dashed var(--border-default); border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--fg-3); background:#fff; }
.photo-remove{ position:absolute; top:-6px; right:-6px; width:22px; height:22px; border-radius:999px; background:#131317; color:#fff; display:flex; align-items:center; justify-content:center; }

.empty-state{ text-align:center; padding:48px 20px; color:var(--fg-3); font-size:14px; }

.hidden-file-input{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }

@media print{ .app-shell{ display:none; } }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="cam-input" class="hidden-file-input" accept="image/*" capture="environment">
<input type="file" id="gal-input" class="hidden-file-input" accept="image/*" multiple>
<script>
"use strict";
/* ============================================================
   ตรวจ & ปรับปรุงบ้าน AP — เครื่องมือวิศวกรโครงการ (SE)
   Vanilla JS, offline-first PWA. No network calls, no build step.
   ============================================================ */

/* ---------- constants ---------- */
var LS_KEY = 'ap_inspect_v3';
var LS_KEY_OLD = 'ap_se_inspect_v2';
var MAX_PHOTOS_PER_DEFECT = 6;

var CATS = [
  { id:'paint', name:'สี' }, { id:'tile', name:'กระเบื้อง' }, { id:'elec', name:'ไฟฟ้า' },
  { id:'plumb', name:'ประปา' }, { id:'door', name:'ประตู-หน้าต่าง' }, { id:'wood', name:'งานไม้' }, { id:'ceil', name:'ฝ้า/ผนัง' },
];
var SEV = {
  high:{ name:'ร้ายแรง', color:'#921C1E' },
  mid:  { name:'ปานกลาง', color:'#B5791A' },
  low:  { name:'เล็กน้อย', color:'#4A4A52' },
};
var STATUS = {
  open:{ name:'รอแก้', color:'#921C1E', bg:'#FAEBEB' },
  prog:{ name:'กำลังแก้', color:'#B5791A', bg:'#F6ECD6' },
  done:{ name:'แก้แล้ว', color:'#2F7A4F', bg:'#E8F1EC' },
};
var STATUS_ORDER = ['open','prog','done'];
var ROOMS = ['ห้องนั่งเล่น','ครัว','ห้องนอนใหญ่','ห้องนอน 2','ห้องน้ำ','ระเบียง','โรงจอดรถ','ภายนอก'];
var TYPES = ['บ้านเดี่ยว','บ้านแฝด','ทาวน์โฮม','คอนโดฯ'];

/* ---------- utils ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(t){ return String(t==null?'':t).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function attr(t){ return esc(t); }
function styleUrl(u){ return u ? "background-image:url(" + JSON.stringify(u).replace(/"/g,"'") + ")" : ''; }

function downscalePhoto(file){
  return new Promise(function(resolve){
    var r = new FileReader();
    r.onload = function(){
      var img = new Image();
      img.onload = function(){
        var max = 900, w = img.width, h = img.height;
        var sc = Math.min(1, max / Math.max(w, h));
        var c = document.createElement('canvas');
        c.width = Math.max(1, Math.round(w * sc));
        c.height = Math.max(1, Math.round(h * sc));
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.62));
      };
      img.onerror = function(){ resolve(null); };
      img.src = r.result;
    };
    r.onerror = function(){ resolve(null); };
    r.readAsDataURL(file);
  });
}

/* ---------- storage: structured data (localStorage) ---------- */
var Store = {
  load: function(){
    try { var raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  },
  save: function(projects){
    try { localStorage.setItem(LS_KEY, JSON.stringify(projects)); return true; }
    catch(e){ console.warn('บันทึกข้อมูลไม่สำเร็จ (พื้นที่จัดเก็บเต็ม?)', e); return false; }
  }
};

/* ---------- storage: photos (IndexedDB, falls back to localStorage) ---------- */
var Photos = (function(){
  var dbPromise = null;
  var FALLBACK_KEY = 'ap_inspect_photos_fallback';

  function openDB(){
    if (dbPromise) return dbPromise;
    dbPromise = new Promise(function(resolve){
      if (!('indexedDB' in window)) { resolve(null); return; }
      try {
        var req = indexedDB.open('ap_inspect_photos_db', 1);
        req.onupgradeneeded = function(){ req.result.createObjectStore('photos'); };
        req.onsuccess = function(){ resolve(req.result); };
        req.onerror = function(){ resolve(null); };
      } catch(e){ resolve(null); }
    });
    return dbPromise;
  }
  function fallbackAll(){
    try { return JSON.parse(localStorage.getItem(FALLBACK_KEY) || '{}'); } catch(e){ return {}; }
  }
  function fallbackSave(map){
    try { localStorage.setItem(FALLBACK_KEY, JSON.stringify(map)); return true; } catch(e){ return false; }
  }
  function put(dataUrl){
    return openDB().then(function(db){
      var id = uid();
      if (db){
        return new Promise(function(resolve){
          var tx = db.transaction('photos','readwrite');
          tx.objectStore('photos').put(dataUrl, id);
          tx.oncomplete = function(){ resolve(id); };
          tx.onerror = function(){ resolve(id); };
        });
      }
      var map = fallbackAll(); map[id] = dataUrl; fallbackSave(map);
      return id;
    });
  }
  function get(id){
    if (!id) return Promise.resolve(null);
    return openDB().then(function(db){
      if (db){
        return new Promise(function(resolve){
          var tx = db.transaction('photos','readonly');
          var req = tx.objectStore('photos').get(id);
          req.onsuccess = function(){ resolve(req.result || null); };
          req.onerror = function(){ resolve(null); };
        });
      }
      var map = fallbackAll();
      return map[id] || null;
    });
  }
  function del(id){
    return openDB().then(function(db){
      if (db){
        try { var tx = db.transaction('photos','readwrite'); tx.objectStore('photos').delete(id); } catch(e){}
        return;
      }
      var map = fallbackAll(); delete map[id]; fallbackSave(map);
    });
  }
  return { put:put, get:get, del:del };
})();

/* one-time migration from the earlier prototype's demo data format, if present */
function migrateIfNeeded(){
  var existing = Store.load();
  if (existing && existing.length) return Promise.resolve(existing);
  var oldRaw = null;
  try { oldRaw = localStorage.getItem(LS_KEY_OLD); } catch(e){}
  if (!oldRaw) return Promise.resolve([]);
  var old;
  try { old = JSON.parse(oldRaw); } catch(e){ old = null; }
  if (!old || !old.length) return Promise.resolve([]);
  var chain = Promise.resolve();
  var out = [];
  old.forEach(function(p){
    var np = { id:p.id||uid(), name:p.name||'', details:'', type:p.type||TYPES[0], mode:p.mode||'handover', units:[], createdAt:Date.now() };
    out.push(np);
    (p.units||[]).forEach(function(u){
      var nu = { id:u.id||uid(), code:u.code||'', customer:u.customer||'', appt:u.appt||'', note:'', defects:[], createdAt:Date.now() };
      np.units.push(nu);
      (u.defects||[]).forEach(function(d){
        var nd = { id:d.id||uid(), room:d.room||ROOMS[0], cat:d.cat||CATS[0].id, sev:d.sev||'mid', status:d.status||'open', note:d.note||'', photoIds:[], time:d.time||'', createdAt:Date.now() };
        nu.defects.push(nd);
        (d.photos||[]).forEach(function(url){
          chain = chain.then(function(){ return Photos.put(url); }).then(function(id){ nd.photoIds.push(id); });
        });
      });
    });
  });
  return chain.then(function(){ Store.save(out); return out; });
}

/* ---------- in-memory state ---------- */
var projects = [];
var photoUrlCache = new Map();
var pendingPhotos = []; /* [{url, photoId|null}] while the defect sheet is open */

var state = {
  screen: 'projects',   /* projects | project | unit */
  curP: null, curU: null,
  overlay: null,        /* null | 'project' | 'unit' | 'defect' */
  formMode: 'add',       /* add | edit */
  editId: null,
  formType: TYPES[0], formModeVal: 'handover',
  formCat: CATS[0].id, formSev: 'mid', formRoom: ROOMS[0],
};

/* ---------- data helpers ---------- */
function findProject(pid){ return projects.find(function(p){ return p.id === pid; }) || null; }
function findUnit(p, unitId){ return p ? (p.units.find(function(u){ return u.id === unitId; }) || null) : null; }
function findDefect(u, did){ return u ? (u.defects.find(function(d){ return d.id === did; }) || null) : null; }
function persist(){ Store.save(projects); }

function modeMeta(mode){
  return mode === 'stock'
    ? { label:'ปรับปรุง Stock', bg:'#EDE7F0', color:'#5B3A82', unitWord:'บ้าน' }
    : { label:'ตรวจรับลูกค้า', bg:'#E3EEF5', color:'#215E7A', unitWord:'ยูนิต' };
}
function catName(id){ var c = CATS.find(function(x){ return x.id===id; }); return c ? c.name : id; }
function defCount(p){ var n=0; p.units.forEach(function(u){ n += u.defects.length; }); return n; }
function openCount(p){ var n=0; p.units.forEach(function(u){ u.defects.forEach(function(d){ if (d.status!=='done') n++; }); }); return n; }
function progressOf(p){ var t=0,d=0; p.units.forEach(function(u){ u.defects.forEach(function(x){ t++; if (x.status==='done') d++; }); }); return t===0?0:Math.round(d/t*100); }
function unitStatusMeta(u){
  if (u.defects.length===0) return { label:'ยังไม่ตรวจ', color:'#4A4A52', bg:'#F0EEE8' };
  var hasOpen = u.defects.some(function(d){ return d.status!=='done'; });
  return hasOpen ? { label:'มี defect', color:'#921C1E', bg:'#FAEBEB' } : { label:'ผ่าน', color:'#2F7A4F', bg:'#E8F1EC' };
}
function unitOpenCount(u){ return u.defects.filter(function(d){ return d.status!=='done'; }).length; }
function unitSub(p, u){
  if (p.mode === 'stock') return u.customer ? u.customer : (u.note ? u.note : 'บ้าน Stock');
  if (u.customer) return u.customer + (u.appt ? ' · ' + u.appt : '');
  return u.appt || 'ลูกค้า';
}

/* ---------- render root ---------- */
function render(){
  var root = document.getElementById('app');
  root.innerHTML = renderApp();
  hydrateLazyPhotos(root);
}
function hydrateLazyPhotos(container){
  var els = container.querySelectorAll('[data-lazy-photo]');
  els.forEach(function(el){
    var id = el.getAttribute('data-lazy-photo');
    if (photoUrlCache.has(id)){
      el.style.backgroundImage = "url(" + photoUrlCache.get(id) + ")";
      el.removeAttribute('data-lazy-photo');
      return;
    }
    Photos.get(id).then(function(url){
      if (url){ photoUrlCache.set(id, url); el.style.backgroundImage = "url(" + url + ")"; }
      el.removeAttribute('data-lazy-photo');
    });
  });
}

function renderApp(){
  var screenHtml = '';
  if (state.screen === 'projects') screenHtml = renderProjectsScreen();
  else if (state.screen === 'project') screenHtml = renderProjectScreen();
  else if (state.screen === 'unit') screenHtml = renderUnitScreen();

  var overlayHtml = '';
  if (state.overlay === 'project') overlayHtml = renderProjectOverlay();
  else if (state.overlay === 'unit') overlayHtml = renderUnitOverlay();
  else if (state.overlay === 'defect') overlayHtml = renderDefectOverlay();

  return '<div class="app-shell">' + screenHtml + overlayHtml + '</div>';
}

/* ---------- screen: projects (home) ---------- */
function renderProjectsScreen(){
  var body;
  if (projects.length === 0){
    body = '<div class="empty-state">' +
      '<svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin-bottom:14px;"><path d="M3 21V8l9-5 9 5v13"></path><path d="M9 21v-6h6v6"></path></svg>' +
      '<div>ยังไม่มีโครงการ<br>กดปุ่มด้านล่างเพื่อเพิ่มโครงการแรก</div></div>';
  } else {
    body = '<div style="display:flex;flex-direction:column;gap:13px;">' +
      projects.map(function(p){
        var meta = modeMeta(p.mode);
        var prog = progressOf(p);
        var open = openCount(p);
        var total = defCount(p);
        var openLabel = open>0 ? (open+' รอแก้') : (total>0 ? 'ครบแล้ว' : 'ยังไม่เริ่ม');

      '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"></path><circle cx="12" cy="13" r="3.2"></circle></svg>ถ่ายรูป</button>' +
    '<button type="button" class="tapopt" data-action="trigger-gallery" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:#fff;border:1px solid var(--border-default);border-radius:12px;padding:11px 10px;font-size:13px;font-weight:600;color:var(--fg-1);">' +
      '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.6"></circle><path d="m21 15-5-5L5 21"></path></svg>เลือกจากคลัง</button>' +
  '</div>';
  return camBtns + '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">' + tiles + '</div>' +
    (pendingPhotos.length >= MAX_PHOTOS_PER_DEFECT ? '<div style="font-size:11.5px;color:var(--fg-3);margin-top:6px;">ใส่รูปได้สูงสุด '+MAX_PHOTOS_PER_DEFECT+' รูปต่อรายการ</div>' : '');
}

function renderDefectOverlay(){
  var isEdit = state.formMode === 'edit';
  var P = findProject(state.curP);
  var U = findUnit(P, state.curU);
  var D = isEdit ? findDefect(U, state.editId) : null;

  var curCat = D ? D.cat : state.formCat;
  var curSev = D ? D.sev : state.formSev;
  var curRoom = D ? D.room : state.formRoom;
  var note = D ? D.note : '';

  var catChips = CATS.map(function(c){
    return '<span class="chip tapopt'+(c.id===curCat?' is-active':'')+'" data-group="cat" data-value="'+c.id+'" data-action="pick-chip">'+esc(c.name)+'</span>';
  }).join('');
  var sevChips = ['high','mid','low'].map(function(id){
    var v = SEV[id];
    return '<span class="sev-chip tapopt'+(id===curSev?' is-active':'')+'" data-group="sev" data-value="'+id+'" data-action="pick-chip">'+esc(v.name)+'</span>';
  }).join('');
  var roomChips = ROOMS.map(function(r){
    return '<span class="chip tapopt'+(r===curRoom?' is-active':'')+'" data-group="room" data-value="'+attr(r)+'" data-action="pick-chip">'+esc(r)+'</span>';
  }).join('');

  return '<div class="overlay-backdrop tapopt" data-action="close-overlay"></div>' +
  '<div class="overlay-sheet" id="defect-overlay">' +
    '<div class="sheet-grabber"></div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
      '<span style="font-size:20px;font-weight:700;">'+(isEdit?'แก้ไข defect':'บันทึก defect')+'</span>' +
      '<span class="tapopt icon-btn" data-action="close-overlay" style="background:var(--ap-neutral-200);color:var(--fg-2);">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"></path></svg></span>' +
    '</div>' +
    '<div class="field-label">รูปถ่าย</div>' +
    '<div id="defect-photo-strip" style="margin-bottom:18px;">'+renderPhotoStripHtml()+'</div>' +
    '<div class="field-label">หมวดหมู่</div>' +
    '<div class="chip-row" style="margin-bottom:18px;">'+catChips+'</div>' +
    '<div class="field-label">ระดับความรุนแรง</div>' +
    '<div style="display:flex;gap:8px;margin-bottom:18px;">'+sevChips+'</div>' +
    '<div class="field-label">ห้อง / พื้นที่</div>' +
    '<div class="chip-row" style="margin-bottom:18px;">'+roomChips+'</div>' +
    '<div class="field-label">รายละเอียด</div>' +
    '<textarea class="fld" id="f-d-note" rows="3" placeholder="พิมพ์รายละเอียดที่พบ…" style="margin-bottom:20px;">'+esc(note)+'</textarea>' +
    '<button type="button" class="btn-primary tapopt" data-action="submit-defect">'+(isEdit?'บันทึกการแก้ไข':'บันทึก defect')+'</button>' +
  '</div>';
}

function refreshPhotoStrip(){
  var el = document.getElementById('defect-photo-strip');
  if (!el) return;
  el.innerHTML = renderPhotoStripHtml();
  hydrateLazyPhotos(el);
}

/* ---------- navigation ---------- */
function gotoProjects(){ state.screen='projects'; state.curP=null; state.curU=null; state.overlay=null; render(); }
function gotoProject(pid){ state.screen='project'; state.curP=pid; state.curU=null; state.overlay=null; render(); }
function gotoUnit(pid, unitId){ state.screen='unit'; state.curP=pid; state.curU=unitId; state.overlay=null; render(); }
function backToProject(){ state.screen='project'; state.curU=null; state.overlay=null; render(); }

function openProjectOverlay(mode, id){
  state.overlay='project'; state.formMode=mode; state.editId=id||null;
  if (mode!=='edit'){ state.formType=TYPES[0]; state.formModeVal='handover'; }
  render();
}
function openUnitOverlay(mode, id){
  state.overlay='unit'; state.formMode=mode; state.editId=id||null;
  render();
}
function openDefectOverlay(mode, id){
  state.overlay='defect'; state.formMode=mode; state.editId=id||null;
  state.formCat=CATS[0].id; state.formSev='mid'; state.formRoom=ROOMS[0];
  if (mode==='edit'){
    var P = findProject(state.curP), U = findUnit(P, state.curU), D = findDefect(U, id);
    if (D){
      Promise.all((D.photoIds||[]).map(function(pid){
        return Photos.get(pid).then(function(url){ return { url:url, photoId:pid }; });
      })).then(function(list){
        pendingPhotos = list.filter(function(x){ return x.url; });
        render();
      });
      pendingPhotos = [];
    }
  } else {
    pendingPhotos = [];
  }
  render();
}
function closeOverlay(){ state.overlay=null; pendingPhotos=[]; render(); }

/* ---------- mutations ---------- */
function submitProjectForm(){
  var nameEl = document.getElementById('f-p-name');
  var name = nameEl.value.trim();
  if (!name){ nameEl.focus(); nameEl.style.borderColor = 'var(--ap-red-600)'; return; }
  var details = document.getElementById('f-p-details').value.trim();
  var typeChip = document.querySelector('#project-overlay [data-group="type"].is-active');
  var modeCard = document.querySelector('#project-overlay [data-group="mode"].is-active');
  var type = typeChip ? typeChip.getAttribute('data-value') : TYPES[0];
  var modeVal = modeCard ? modeCard.getAttribute('data-value') : 'handover';

  if (state.formMode === 'edit'){
    var P = findProject(state.editId);
    if (P){ P.name=name; P.details=details; P.type=type; P.mode=modeVal; }
    persist();
    state.overlay = null;
    render();
  } else {
    var np = { id:uid(), name:name, details:details, type:type, mode:modeVal, units:[], createdAt:Date.now() };
    projects.unshift(np);
    persist();
    state.overlay = null; state.screen='project'; state.curP=np.id;
    render();
  }
}

function submitUnitForm(){
  var P = findProject(state.curP);
  var isStock = P.mode === 'stock';
  var codeEl = document.getElementById('f-u-code');
  var code = codeEl.value.trim();
  if (!code){ codeEl.focus(); codeEl.style.borderColor='var(--ap-red-600)'; return; }
  var customer = '', appt = '', note = '';
  if (isStock){ note = (document.getElementById('f-u-note')||{value:''}).value.trim(); }
  else {
    customer = (document.getElementById('f-u-customer')||{value:''}).value.trim();
    appt = (document.getElementById('f-u-appt')||{value:''}).value.trim();
  }

  if (state.formMode === 'edit'){
    var U = findUnit(P, state.editId);
    if (U){ U.code=code; U.customer=customer; U.appt=appt; U.note=note; }
  } else {
    P.units.push({ id:uid(), code:code, customer:customer, appt:appt, note:note, defects:[], createdAt:Date.now() });
  }
  persist();
  state.overlay = null;
  render();
}

function submitDefectForm(){
  var P = findProject(state.curP);
  var U = findUnit(P, state.curU);
  var catChip = document.querySelector('#defect-overlay [data-group="cat"].is-active');
  var sevChip = document.querySelector('#defect-overlay [data-group="sev"].is-active');
  var roomChip = document.querySelector('#defect-overlay [data-group="room"].is-active');
  var note = document.getElementById('f-d-note').value.trim() || '(ไม่มีรายละเอียด)';
  var cat = catChip ? catChip.getAttribute('data-value') : CATS[0].id;
  var sev = sevChip ? sevChip.getAttribute('data-value') : 'mid';
  var room = roomChip ? roomChip.getAttribute('data-value') : ROOMS[0];
  var now = new Date().toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });

  var putPromises = pendingPhotos.map(function(ph){
    if (ph.photoId) return Promise.resolve(ph.photoId);
    return Photos.put(ph.url).then(function(id){ photoUrlCache.set(id, ph.url); return id; });
  });

  Promise.all(putPromises).then(function(photoIds){
    if (state.formMode === 'edit'){
      var D = findDefect(U, state.editId);
      if (D){ D.cat=cat; D.sev=sev; D.room=room; D.status=D.status; D.note=note; D.photoIds=photoIds; }
    } else {
      U.defects.push({ id:uid(), room:room, cat:cat, sev:sev, status:'open', note:note, photoIds:photoIds, time:now, createdAt:Date.now() });
    }
    persist();
    state.overlay = null;
    pendingPhotos = [];
    render();
  });
}

function cycleDefectStatus(did){
  var P = findProject(state.curP), U = findUnit(P, state.curU), D = findDefect(U, did);
  if (!D) return;
  var idx = STATUS_ORDER.indexOf(D.status);
  D.status = STATUS_ORDER[(idx + 1) % STATUS_ORDER.length];
  persist(); render();
}
function removeDefect(did){
  var P = findProject(state.curP), U = findUnit(P, state.curU);
  if (!U) return;
  var D = findDefect(U, did);
  if (D && D.photoIds) D.photoIds.forEach(function(id){ Photos.del(id); });
  U.defects = U.defects.filter(function(d){ return d.id !== did; });
  persist(); render();
}
function moveDefect(did, dir){
  var P = findProject(state.curP), U = findUnit(P, state.curU);
  if (!U) return;
  var idx = U.defects.findIndex(function(d){ return d.id === did; });
  var swapIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (idx < 0 || swapIdx < 0 || swapIdx >= U.defects.length) return;
  var tmp = U.defects[idx]; U.defects[idx] = U.defects[swapIdx]; U.defects[swapIdx] = tmp;
  persist(); render();
}

/* ---------- photo capture ---------- */
function addFilesAsPhotos(fileList){
  var files = Array.prototype.slice.call(fileList || []);
  if (!files.length) return;
  var room = MAX_PHOTOS_PER_DEFECT - pendingPhotos.length;
  files = files.slice(0, Math.max(0, room));
  Promise.all(files.map(downscalePhoto)).then(function(urls){
    urls.forEach(function(url){ if (url) pendingPhotos.push({ url:url, photoId:null }); });
    refreshPhotoStrip();
  });
}

/* ---------- PDF / table export ---------- */
function buildReportHtml(P, units, urlMap, scope){
  var mm = modeMeta(P.mode);
  var isStock = P.mode === 'stock';
  var today = new Date().toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' });
  var baseTitle = isStock ? 'รายการปรับปรุงบ้าน Stock' : 'ใบรายการตรวจรับบ้าน';
  var title = scope === 'unit' && units[0] ? (baseTitle + ' — ' + units[0].code) : baseTitle;

  var all = [];
  units.forEach(function(u){ u.defects.forEach(function(d){ all.push(d); }); });
  var counts = {
    all: all.length,
    open: all.filter(function(d){ return d.status==='open'; }).length,
    prog: all.filter(function(d){ return d.status==='prog'; }).length,
    done: all.filter(function(d){ return d.status==='done'; }).length,
  };
  var STCOL = { open:'#921C1E', prog:'#B5791A', done:'#2F7A4F' };
  var STTH = { open:'รอแก้', prog:'กำลังแก้', done:'แก้แล้ว' };

  function thumbsHtml(photoIds){
    if (!photoIds || !photoIds.length) return '<span style="color:#C9C6BC;font-size:10px;">—</span>';
    var shown = photoIds.slice(0, 4);
    var imgs = shown.map(function(id){
      var url = urlMap.get(id);
      return url ? '<img src="'+url+'" style="width:34px;height:26px;object-fit:cover;border-radius:3px;">' : '';
    }).join('');
    var more = photoIds.length > 4 ? '<span style="font-size:9px;color:#4A4A52;">+'+(photoIds.length-4)+'</span>' : '';
    return '<div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;">' + imgs + more + '</div>';
  }

  var unitBlocks = units.map(function(u){
    var rows = u.defects.map(function(d, i){
      var sev = SEV[d.sev];
      return '<tr><td class="c">'+(i+1)+'</td><td class="c">'+thumbsHtml(d.photoIds)+'</td><td>'+esc(d.room)+'</td><td>'+esc(catName(d.cat))+'</td><td>'+esc(d.note)+'</td>' +
        '<td class="c"><b style="color:'+sev.color+'">'+esc(sev.name)+'</b></td>' +
        '<td class="c"><span class="st" style="color:'+STCOL[d.status]+';border-color:'+STCOL[d.status]+'">'+esc(STTH[d.status])+'</span></td></tr>';
    }).join('') || '<tr><td colspan="7" style="text-align:center;color:#9C9CA4;padding:14px;">ไม่มี defect</td></tr>';
    var sub = isStock ? (u.customer || u.note ? 'หมายเหตุ: '+esc(u.customer||u.note) : '')
      : (u.customer ? 'ลูกค้า: '+esc(u.customer)+(u.appt?' · '+esc(u.appt):'') : (u.appt?esc(u.appt):''));
    return '<section class="unit"><h2>'+esc(u.code)+' <span>'+sub+'</span></h2><table><thead><tr><th class="c">#</th><th class="c">รูป</th><th>ห้อง</th><th>หมวดหมู่</th><th>รายละเอียด</th><th class="c">ระดับ</th><th class="c">สถานะ</th></tr></thead><tbody>'+rows+'</tbody></table></section>';
  }).join('');

  var sign = isStock ? '' : '<div class="sign"><div><div class="sline"></div>ผู้ตรวจ (SE)</div><div><div class="sline"></div>ลูกค้า / ผู้รับมอบ</div></div>';
  var detailsLine = P.details ? ' · '+esc(P.details) : '';

  var css = '@page{size:A4;margin:15mm 13mm;}*{box-sizing:border-box;}body{font-family:"Sarabun","Noto Sans Thai",-apple-system,sans-serif;color:#131317;margin:0;}' +
    '.top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #921C1E;padding-bottom:13px;margin-bottom:20px;}' +
    '.brand{font-size:26px;font-weight:800;color:#921C1E;letter-spacing:-.5px;}.brand small{display:block;font-size:10px;font-weight:700;letter-spacing:2px;color:#131317;margin-top:2px;}' +
    '.meta{text-align:right;font-size:12px;color:#4A4A52;line-height:1.6;}h1{font-size:19px;margin:0 0 3px;}.pj{font-size:13px;color:#4A4A52;margin-bottom:20px;}' +
    '.summary{display:flex;gap:9px;margin-bottom:22px;}.card{flex:1;border:1px solid #E2DFD6;border-radius:9px;padding:9px 13px;}.card b{display:block;font-size:22px;}.card span{font-size:11px;color:#4A4A52;}' +
    '.unit{margin-bottom:20px;page-break-inside:avoid;}.unit h2{font-size:14px;background:#F0EEE8;padding:7px 12px;border-radius:6px;margin:0 0 7px;display:flex;justify-content:space-between;align-items:baseline;}.unit h2 span{font-weight:500;color:#4A4A52;font-size:11.5px;}' +
    'table{width:100%;border-collapse:collapse;font-size:11.5px;}th{text-align:left;background:#921C1E;color:#fff;padding:6px 8px;font-weight:600;}td{padding:6px 8px;border-bottom:1px solid #EAE8E2;vertical-align:top;}td.c,th.c{text-align:center;}' +
    '.st{font-weight:700;border:1px solid;border-radius:999px;padding:2px 8px;font-size:10.5px;white-space:nowrap;}' +
    '.sign{display:flex;gap:60px;margin-top:44px;page-break-inside:avoid;}.sign>div{flex:1;font-size:12px;color:#4A4A52;text-align:center;}.sline{border-bottom:1px solid #131317;height:40px;margin-bottom:6px;}' +
    '.foot{margin-top:26px;border-top:1px solid #EAE8E2;padding-top:9px;font-size:10px;color:#9C9CA4;display:flex;justify-content:space-between;}' +
    '@media screen{body{background:#EAE8E2;}.page{background:#fff;max-width:800px;margin:24px auto;padding:38px 42px;box-shadow:0 8px 30px rgba(0,0,0,.15);}.ph{position:fixed;top:16px;right:16px;background:#921C1E;color:#fff;padding:12px 18px;border-radius:999px;font:600 13px sans-serif;cursor:pointer;border:0;}}' +
    '@media print{.page{padding:0;}.ph{display:none;}}';

  var body = '<div class="page"><div class="top"><div class="brand">AP<small>SE FIELD REPORT</small></div><div class="meta">'+esc(title)+'<br>วันที่: '+today+'<br>ผู้ตรวจ (SE): ______________</div></div>' +
    '<h1>'+esc(title)+'</h1><div class="pj">โครงการ: '+esc(P.name)+' · '+esc(P.type)+' · '+esc(mm.label)+detailsLine+'</div>' +
    '<div class="summary"><div class="card"><b>'+counts.all+'</b><span>ทั้งหมด</span></div><div class="card"><b style="color:#921C1E">'+counts.open+'</b><span>รอแก้</span></div><div class="card"><b style="color:#B5791A">'+counts.prog+'</b><span>กำลังแก้</span></div><div class="card"><b style="color:#2F7A4F">'+counts.done+'</b><span>แก้แล้ว</span></div></div>' +
    unitBlocks + sign + '<div class="foot"><span>AP (Thailand) PCL</span><span>สร้างอัตโนมัติจากแอปตรวจ &amp; ปรับปรุงบ้าน</span></div></div>';
  var scriptTag = '<scr' + 'ipt>window.addEventListener("load",function(){setTimeout(function(){window.print();},450);});</scr' + 'ipt>';
  return '<!DOCTYPE html><html lang="th"><head><meta charset="utf-8"><title>'+esc(title)+' · '+esc(P.name)+'</title><style>'+css+'</style></head><body>'+body+'<button class="ph" onclick="window.print()">พิมพ์ / บันทึก PDF</button>'+scriptTag+'</body></html>';
}

function exportPDF(scope, pid, unitId){
  var P = findProject(pid);
  if (!P) return;
  var w = window.open('', '_blank');
  var units = scope === 'unit' ? [findUnit(P, unitId)].filter(Boolean) : P.units;
  var idSet = new Set();
  units.forEach(function(u){ u.defects.forEach(function(d){ (d.photoIds||[]).forEach(function(id){ idSet.add(id); }); }); });
  Promise.all(Array.from(idSet).map(function(id){ return Photos.get(id).then(function(url){ return [id, url]; }); }))
    .then(function(entries){
      var urlMap = new Map(entries);
      var html = buildReportHtml(P, units, urlMap, scope);
      if (w){ w.document.open(); w.document.write(html); w.document.close(); }
    })
    .catch(function(){ if (w) w.close(); });
}

/* ---------- event delegation ---------- */
document.getElementById('app').addEventListener('click', function(e){
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.getAttribute('data-action');
  switch (action){
    case 'open-project': gotoProject(el.getAttribute('data-id')); break;
    case 'open-unit': gotoUnit(state.curP, el.getAttribute('data-id')); break;
    case 'back-projects': gotoProjects(); break;
    case 'back-project': backToProject(); break;
    case 'open-overlay-project': openProjectOverlay(el.getAttribute('data-mode'), el.getAttribute('data-id')); break;
    case 'open-overlay-unit': openUnitOverlay(el.getAttribute('data-mode'), el.getAttribute('data-id')); break;
    case 'open-overlay-defect': openDefectOverlay(el.getAttribute('data-mode'), el.getAttribute('data-id')); break;
    case 'close-overlay': closeOverlay(); break;
    case 'pick-chip': {
      var group = el.getAttribute('data-group');
      var parent = el.parentElement;
      parent.querySelectorAll('[data-group="'+group+'"]').forEach(function(sib){ sib.classList.remove('is-active'); });
      el.classList.add('is-active');
      break;
    }
    case 'submit-project': submitProjectForm(); break;
    case 'submit-unit': submitUnitForm(); break;
    case 'submit-defect': submitDefectForm(); break;
    case 'cycle-status': cycleDefectStatus(el.getAttribute('data-id')); break;
    case 'remove-defect': if (window.confirm('ลบ defect นี้ใช่หรือไม่?')) removeDefect(el.getAttribute('data-id')); break;
    case 'move-defect': moveDefect(el.getAttribute('data-id'), el.getAttribute('data-dir')); break;
    case 'export-pdf': exportPDF(el.getAttribute('data-scope'), el.getAttribute('data-pid'), el.getAttribute('data-uid')); break;
    case 'trigger-camera': document.getElementById('cam-input').click(); break;
    case 'trigger-gallery': document.getElementById('gal-input').click(); break;
    case 'remove-photo': {
      var idx = parseInt(el.getAttribute('data-index'), 10);
      pendingPhotos.splice(idx, 1);
      refreshPhotoStrip();
      break;
    }
    default: break;
  }
});

document.getElementById('cam-input').addEventListener('change', function(e){
  addFilesAsPhotos(e.target.files);
  e.target.value = '';
});
document.getElementById('gal-input').addEventListener('change', function(e){
  addFilesAsPhotos(e.target.files);
  e.target.value = '';
});

/* ---------- PWA registration (safe no-op on file:// / unsupported browsers) ---------- */
function registerPWA(){
  try {
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  } catch(e){}
}

/* ---------- boot ---------- */
migrateIfNeeded().then(function(loaded){
  projects = loaded && loaded.length ? loaded : (Store.load() || []);
  render();
  registerPWA();
});
</script>
